# ============================================================
# TripPlanAgent — 一键启动
#
# 用法:
#   1. 复制 backend/.env.example 为 backend/.env，填好 API 密钥
#   2. docker compose up
#   3. 浏览器打开 http://localhost:5173
# ============================================================

services:
  backend:
    build: ./backend
    container_name: tripplan-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend/logs:/app/logs      # 日志持久化到宿主机
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tripplan-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
